<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google 登入 - Vibe Coding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .gradient-bg { background: radial-gradient(circle at top right, #f8fafc 0%, #e0e7ff 100%); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="gradient-bg min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <!-- Logo Branding -->
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-3 text-3xl font-extrabold text-indigo-900 tracking-tighter">
                <span>🚀</span> Vibe Coding
            </a>
        </div>

        <div class="glass-card rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden">
            <div class="space-y-6">
                <h2 class="text-2xl font-bold text-slate-800 text-center">使用 Google 帳號登入</h2>
                <p id="login-hint" class="text-sm text-slate-500 text-center">系統授權與課程存取統一使用 Google 帳號。</p>
                <div id="demo-panel" class="hidden rounded-2xl border border-emerald-200 bg-emerald-50 p-4 text-sm text-emerald-900 space-y-3">
                    <p class="font-semibold">外網 Demo 預覽模式</p>
                    <p>透過 ngrok 無法使用 Google 登入（Firebase 未授權此網域）。請直接進入課程：</p>
                    <div class="flex flex-col gap-2">
                        <a href="start.html?demo=1" class="text-center py-2 rounded-xl bg-emerald-600 text-white font-semibold hover:bg-emerald-700">入門課程</a>
                        <a href="basic.html?demo=1" class="text-center py-2 rounded-xl bg-emerald-600 text-white font-semibold hover:bg-emerald-700">基礎課程</a>
                        <a href="advanced.html?demo=1" class="text-center py-2 rounded-xl bg-emerald-600 text-white font-semibold hover:bg-emerald-700">進階課程</a>
                    </div>
                </div>
                <div id="error-msg" class="text-red-500 text-sm italic px-1 hidden text-center"></div>

                <button type="button" id="google-login-btn" class="w-full bg-white border border-slate-300 text-slate-800 font-bold py-4 rounded-2xl shadow-sm hover:bg-slate-50 transition-all flex items-center justify-center gap-3">
                    <span id="btn-text">使用 Google 登入</span>
                    <div id="btn-loader" class="loader"></div>
                </button>
            </div>
        </div>

        <!-- Back Link -->
        <div class="text-center mt-8">
            <a href="index.html" class="text-slate-400 hover:text-indigo-600 text-sm font-medium transition-colors">
                ← 返回首頁 (Back to Home)
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import {
            firebaseConfig,
            isLocalDev,
            isNgrokHost,
            isDemoMode,
            connectFirebaseEmulators,
            prepareAuthPersistence,
            finishAuthRedirectIfNeeded,
        } from "./js/firebase-local.js?v=2026.05.29.auth-persist";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        connectFirebaseEmulators({ auth });

        const AUTO_LOGIN_KEY = 'vc_auto_google_login_started_at';
        const isDemoOnly = isDemoMode();

        function showDemoPanel() {
            document.getElementById('demo-panel')?.classList.remove('hidden');
            const btn = document.getElementById('google-login-btn');
            const hint = document.getElementById('login-hint');
            if (btn) btn.classList.add('hidden');
            if (hint) hint.textContent = 'Demo 模式：請使用下方課程連結，無需登入。';
        }

        if (isDemoOnly) {
            showDemoPanel();
        }

        function getReturnUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('returnUrl');
        }

        function redirectAfterLogin() {
            const returnUrl = getReturnUrl();
            if (returnUrl) {
                window.location.replace(decodeURIComponent(returnUrl));
            } else {
                window.location.replace("index.html");
            }
        }

        async function handleGoogleAuth() {
            if (isDemoOnly) return;

            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('google-login-btn');

            btnText.style.opacity = '0.5';
            btnLoader.style.display = 'block';
            submitBtn.disabled = true;
            errorMsg.classList.add('hidden');

            const provider = new GoogleAuthProvider();
            const useRedirect = isNgrokHost();

            try {
                if (useRedirect) {
                    btnText.textContent = '正在前往 Google...';
                    sessionStorage.setItem(AUTO_LOGIN_KEY, String(Date.now()));
                    await prepareAuthPersistence(auth);
                    await signInWithRedirect(auth, provider);
                    return;
                }
                await signInWithPopup(auth, provider);
                redirectAfterLogin();
            } catch (error) {
                console.error(error);
                errorMsg.classList.remove('hidden');
                const code = error.code || error.message || '';
                if (code === 'auth/popup-blocked' || code === 'auth/popup-closed-by-user') {
                    errorMsg.innerText = '彈出視窗被阻擋，改以重新導向登入…';
                    try {
                        await signInWithRedirect(auth, provider);
                        return;
                    } catch (redirectErr) {
                        errorMsg.innerText = `Google 登入失敗：${redirectErr.code || redirectErr.message}`;
                    }
                } else if (isNgrokHost() && String(code).includes('referer') && String(code).includes('blocked')) {
                    errorMsg.innerText = 'Google 登入失敗：Auth Emulator 未連上。請強制重新整理（Cmd+Shift+R）後再試；或改用 http://localhost:5002/login.html';
                } else {
                    errorMsg.innerText = `Google 登入失敗：${code}`;
                }
            } finally {
                btnText.textContent = '使用 Google 登入';
                btnText.style.opacity = '1';
                btnLoader.style.display = 'none';
                submitBtn.disabled = false;
            }
        }

        async function startGoogleRedirectLogin() {
            const errorMsg = document.getElementById('error-msg');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const submitBtn = document.getElementById('google-login-btn');
            try {
                sessionStorage.setItem(AUTO_LOGIN_KEY, String(Date.now()));
                btnText.textContent = '正在前往 Google...';
                btnLoader.style.display = 'block';
                submitBtn.disabled = true;
                await signInWithRedirect(auth, new GoogleAuthProvider());
            } catch (error) {
                console.error(error);
                errorMsg.classList.remove('hidden');
                errorMsg.innerText = "無法自動跳轉 Google，請點擊下方按鈕登入。";
                btnText.textContent = '使用 Google 登入';
                btnLoader.style.display = 'none';
                submitBtn.disabled = false;
            }
        }

        async function bootstrapLogin() {
            if (isDemoOnly) return;

            const errorMsg = document.getElementById('error-msg');
            await prepareAuthPersistence(auth);

            const redirectResult = await finishAuthRedirectIfNeeded(auth);
            if (redirectResult?.user) {
                sessionStorage.removeItem(AUTO_LOGIN_KEY);
                redirectAfterLogin();
                return;
            }

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    sessionStorage.removeItem(AUTO_LOGIN_KEY);
                    redirectAfterLogin();
                    return;
                }

                // 本地 / ngrok：由使用者手動點擊登入（redirect 流程）
                if (isLocalDev() || isNgrokHost()) {
                    return;
                }

                const lastStart = Number(sessionStorage.getItem(AUTO_LOGIN_KEY) || 0);
                const withinCooldown = Date.now() - lastStart < 15000;
                if (!withinCooldown) {
                    await startGoogleRedirectLogin();
                } else {
                    const btnText = document.getElementById('btn-text');
                    const btnLoader = document.getElementById('btn-loader');
                    const submitBtn = document.getElementById('google-login-btn');
                    btnText.textContent = '使用 Google 登入';
                    btnLoader.style.display = 'none';
                    submitBtn.disabled = false;
                }
            });
        }

        document.getElementById('google-login-btn').addEventListener('click', handleGoogleAuth);
        bootstrapLogin();
    </script>
</body>

</html>
